{# Neuer Ansprechpartner — Inline-Formular im Call-Screen #}
{# Wird bei D13 (Weiterverbunden) oder manuell geoeffnet #}

<div x-data="{ saving: false }" class="aq-contact-card" style="padding:12px;margin-bottom:12px;">
    <p style="font-size:12px;font-weight:600;color:var(--pp-text);margin:0 0 10px;">Neuen AP erfassen</p>
    <form @submit.prevent="
        saving = true;
        fetch('/api/companies/{{ company.id if company else '' }}/contacts', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                first_name: $refs.nc_first.value,
                last_name: $refs.nc_last.value,
                position: $refs.nc_position.value,
                phone: $refs.nc_phone.value,
                email: $refs.nc_email.value,
                source: 'manual',
                contact_role: 'empfehlung',
            })
        }).then(r => {
            if (r.ok) {
                if (typeof showToast === 'function') showToast('AP gespeichert', 'success');
                document.getElementById('new-contact-form').style.display = 'none';
            } else {
                if (typeof showToast === 'function') showToast('Fehler beim Speichern', 'error');
            }
            saving = false;
        }).catch(() => { saving = false; })
    ">
        <div class="aq-grid-2" style="margin-bottom:8px;">
            <input x-ref="nc_first" type="text" placeholder="Vorname" required class="aq-input aq-input--sm">
            <input x-ref="nc_last" type="text" placeholder="Nachname" required class="aq-input aq-input--sm">
        </div>
        <input x-ref="nc_position" type="text" placeholder="Funktion (z.B. Personalleitung)" class="aq-input aq-input--sm" style="margin-bottom:8px;">
        <div class="aq-grid-2" style="margin-bottom:8px;">
            <input x-ref="nc_phone" type="tel" placeholder="Telefon" class="aq-input aq-input--sm">
            <input x-ref="nc_email" type="email" placeholder="E-Mail" class="aq-input aq-input--sm">
        </div>
        <div class="aq-flex-center aq-gap-8">
            <button type="button" onclick="document.getElementById('new-contact-form').style.display='none'"
                    style="flex:1;padding:6px;background:rgba(14,16,25,0.7);border:1px solid rgba(255,255,255,0.06);border-radius:6px;color:var(--pp-textMuted);font-size:11px;cursor:pointer;">
                Abbrechen
            </button>
            <button type="submit" :disabled="saving"
                    style="flex:1;padding:6px;background:var(--pp-accent);border:none;border-radius:6px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;">
                Speichern
            </button>
        </div>
    </form>
</div>
